name: Deploy .ait bundle

# Tag-gated deploy: pushing a v* tag builds the .ait bundle, uploads it via
# `aitcc app deploy`, captures the returned intoss-private:// URL, renders it
# as a QR PNG, and publishes everything as a GitHub Release.
#
# NOTE: web-framework 3.0 removed `@apps-in-toss/cli` and with it `ait deploy`.
# Upload now goes through `aitcc app deploy`, which authenticates by console
# session cookie (KR-IP bound) — NOT a Deploy Key. There is no headless API-key
# path in `aitcc app deploy`. As a result, this workflow currently FAILS on
# GHA-hosted runners (no session cookie → exit 10 NotAuthenticated). Headless
# CI deploy is blocked until `ait deploy` returns to web-framework (tracked in
# sdk-example #146). The AITCC_API_KEY secret is retained in repo settings for
# when that path is restored, but it is not consumed by any step in this file.
#
# The in-app debug attach surface (AttachStatusIcon) is present in every
# build and activates when the URL carries ?debug=1 plus a valid wss: relay
# (?relay=<wss>). There is no longer a separate dogfood build — on-device
# relay debugging works on plain release bundles.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (must already exist on origin, e.g. v0.1.5)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-ait-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RELEASE_DIR: .tmp/release
      BUNDLE_PATH: aitc-sdk-example.ait
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build .ait bundle
        run: pnpm bundle:ait

      - name: Upload bundle via aitcc (web-framework 3.0 — ait deploy removed)
        id: deploy
        env:
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          # web-framework 3.0: `ait deploy` is gone; `ait build` only builds.
          # Upload is now done with `aitcc app deploy`. The intoss-private:// URL
          # is constructed from appName (aitc-sdk-example) + deploymentId embedded
          # in the .ait bundle (extracted via aitcc --json --dry-run).
          deployment_id=$(pnpm exec aitcc app deploy --json --dry-run \
            --workspace 3095 --app 31146 \
            "$BUNDLE_PATH" | jq -r '.deploymentId')

          echo "Uploading bundle (deploymentId: $deployment_id) …"
          set +e
          pnpm exec aitcc app deploy \
            --workspace 3095 --app 31146 \
            --memo "Release $TAG" \
            "$BUNDLE_PATH" \
            > deploy-output.txt 2>&1
          deploy_exit=$?
          set -e
          echo "----- aitcc app deploy output -----"
          cat deploy-output.txt
          echo "----- aitcc app deploy exit: $deploy_exit -----"
          if [ "$deploy_exit" -ne 0 ]; then
            echo "::error::aitcc app deploy exited $deploy_exit — see output above"
            exit 1
          fi

          # Construct the intoss-private:// deep-link from appName + deploymentId.
          # Format: intoss-private://<appName>?_deploymentId=<id>
          url="intoss-private://aitc-sdk-example?_deploymentId=${deployment_id}"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$url"

      - name: Render QR + release body
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          TAG: ${{ steps.ref.outputs.tag }}
          COMMIT_SHA: ${{ github.sha }}
        run: pnpm exec tsx scripts/generate-deploy-release.ts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RELEASE_DIR/release-body.md" \
            "$BUNDLE_PATH" \
            "$RELEASE_DIR/qr.png"
